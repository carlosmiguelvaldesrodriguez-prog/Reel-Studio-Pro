name: ia_reel_builder
description: IA Reel Studio Pro V2.0 - Enterprise Marketing Edition.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # EL CEREBRO DE LA APP
  google_generative_ai: ^0.4.0
  provider: ^6.1.1 # Gestión de estado asíncrono para el Chat y UI

  # EL MÚSCULO DE LA APP
  file_picker: ^8.0.0
  path_provider: ^2.1.2
  process_run: ^0.13.0 # Ejecución robusta de ffmpeg.exe
  image: ^4.1.4
  http: ^1.2.0

  # LA EXPERIENCIA DE USUARIO
  reorderables: ^0.6.0 # Para el Timeline Drag & Drop
  audioplayers: ^5.2.1 # Para la Jukebox y pre-escucha

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
